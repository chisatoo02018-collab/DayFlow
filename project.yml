name: DayFlow
options:
  bundleIdPrefix: com.chisatoo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DayFlow:
    type: application
    platform: iOS
    sources:
      - path: DayFlow
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: DayFlow/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chisatoo.dayflow
        CODE_SIGN_ENTITLEMENTS: DayFlow/App/DayFlow.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: DayFlowWidgetExtension
        embed: true

  DayFlowWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DayFlowWidget
    settings:
      base:
        INFOPLIST_FILE: DayFlowWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chisatoo.dayflow.widget
        CODE_SIGN_ENTITLEMENTS: DayFlowWidget/DayFlowWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
