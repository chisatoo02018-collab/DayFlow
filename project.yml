name: DayFlow
options:
  bundleIdPrefix: com.chisatoo
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "49"
    DEVELOPMENT_TEAM: WY55TM2MU8
    CODE_SIGN_STYLE: Automatic

targets:
  DayFlow:
    type: application
    platform: iOS
    sources:
      - path: DayFlow
        excludes:
          # This was an owner-specific importer for a private Obsidian vault
          # (purchase and viewing-history paths). It has no useful setup path
          # for a new customer, so it must not ship in the public app.
          - Services/LifeEventService.swift
      - path: DayFlowShared
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: DayFlow/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chisatoo.dayflow
        CODE_SIGN_ENTITLEMENTS: DayFlow/App/DayFlow.entitlements
        OTHER_SWIFT_FLAGS: "$(inherited) -D FAMILY_CONTROLS_ENABLED"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: DayFlowWidgetExtension
        embed: true
      - target: DayFlowDeviceActivityReportExtension
        embed: true
      - target: DayFlowWatch
        embed: true

  DayFlowWatch:
    type: application
    platform: watchOS
    sources:
      - path: DayFlowWatch
      - path: DayFlowWatchShared
      - path: DayFlowShared/WakeScheduleMessage.swift
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: DayFlowWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chisatoo.dayflow.watchkitapp
        CODE_SIGN_ENTITLEMENTS: DayFlowWatch/DayFlowWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      - target: DayFlowWatchWidgetExtension
        embed: true

  DayFlowWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: DayFlowWatchWidget
      - path: DayFlowWatchShared
    settings:
      base:
        INFOPLIST_FILE: DayFlowWatchWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chisatoo.dayflow.watchkitapp.widget
        CODE_SIGN_ENTITLEMENTS: DayFlowWatchWidget/DayFlowWatchWidget.entitlements
        SKIP_INSTALL: YES

  DayFlowWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DayFlowWidget
      - path: DayFlowShared
    settings:
      base:
        INFOPLIST_FILE: DayFlowWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chisatoo.dayflow.widget
        CODE_SIGN_ENTITLEMENTS: DayFlowWidget/DayFlowWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        TARGETED_DEVICE_FAMILY: "1"

  DayFlowDeviceActivityReportExtension:
    type: extensionkit-extension
    platform: iOS
    sources:
      - path: DayFlowDeviceActivityReport
      - path: DayFlowShared
    settings:
      base:
        INFOPLIST_FILE: DayFlowDeviceActivityReport/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.chisatoo.dayflow.deviceactivityreport
        CODE_SIGN_ENTITLEMENTS: DayFlowDeviceActivityReport/DayFlowDeviceActivityReport.entitlements
        TARGETED_DEVICE_FAMILY: "1"
